<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Próximos Animes — Crunchyroll</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="cr-root" id="crRoot">
    <div class="cr-top-label">Vamos descobrir o que vem a seguir!</div>
    <div class="cr-stage" id="crStage">
      <div class="cr-panel" id="panelC">
        <div class="cr-img-wrap" id="imgWrapC"><div class="cr-img-shadow"></div></div>
        <div class="cr-main">
          <div class="cr-logo-wrap" id="logoWrapC"><div class="cr-logo-text" id="logoTextC"></div></div>
          <div class="cr-meta" id="metaWrapC">
            <span class="cr-rating" id="ratingC"></span>
            <span class="cr-dot-sep"></span>
            <span class="cr-genres" id="genresC"></span>
          </div>
          <div class="cr-desc" id="descC"></div>
          <div class="cr-buttons" id="btnsC">
            <button class="cr-btn-play"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span id="playLabelC">COMEÇAR A ASSISTIR E1</span></button>
            <button class="cr-btn-save" title="Salvar"><svg viewBox="0 0 24 24"><path d="M17 3H7a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2z"/></svg></button>
          </div>
        </div>
      </div>
      <div class="cr-panel" id="panelA">
        <div class="cr-img-wrap" id="imgWrapA"><div class="cr-img-shadow"></div></div>
        <div class="cr-main">
          <div class="cr-logo-wrap" id="logoWrapA"><div class="cr-logo-text" id="logoTextA"></div></div>
          <div class="cr-meta" id="metaWrapA">
            <span class="cr-rating" id="ratingA"></span>
            <span class="cr-dot-sep"></span>
            <span class="cr-genres" id="genresA"></span>
          </div>
          <div class="cr-desc" id="descA"></div>
          <div class="cr-buttons" id="btnsA">
            <button class="cr-btn-play"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span id="playLabelA">COMEÇAR A ASSISTIR E1</span></button>
            <button class="cr-btn-save" title="Salvar"><svg viewBox="0 0 24 24"><path d="M17 3H7a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2z"/></svg></button>
          </div>
        </div>
      </div>
      <div class="cr-panel" id="panelB">
        <div class="cr-img-wrap" id="imgWrapB"><div class="cr-img-shadow"></div></div>
        <div class="cr-main">
          <div class="cr-logo-wrap" id="logoWrapB"><div class="cr-logo-text" id="logoTextB"></div></div>
          <div class="cr-meta" id="metaWrapB">
            <span class="cr-rating" id="ratingB"></span>
            <span class="cr-dot-sep"></span>
            <span class="cr-genres" id="genresB"></span>
          </div>
          <div class="cr-desc" id="descB"></div>
          <div class="cr-buttons" id="btnsB">
            <button class="cr-btn-play"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><span id="playLabelB">COMEÇAR A ASSISTIR E1</span></button>
            <button class="cr-btn-save" title="Salvar"><svg viewBox="0 0 24 24"><path d="M17 3H7a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2z"/></svg></button>
          </div>
        </div>
      </div>
    </div>
    <div class="cr-ui-layer"><div class="cr-dots" id="dotsWrap"></div></div>
    <div class="cr-progress" id="progressBar"></div>
    <div class="cr-particles" id="particlesContainer"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
